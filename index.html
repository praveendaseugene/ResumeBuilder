<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSource Resume Builder - Free Professional CV Maker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-hover: #f1f5f9;
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        .dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            line-height: 1.5;
            transition: background 0.3s, color 0.3s;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .nav-bar {
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
            gap: 8px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;
        }
        .nav-brand i { font-size: 20px; }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
        }

        .btn {
            padding: 7px 12px;
            border: none;
            border-radius: var(--radius-xs);
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn:hover { background: var(--surface-hover); transform: translateY(-1px); }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-icon { width: 34px; height: 34px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .btn-sm { padding: 5px 10px; font-size: 11px; }
        .btn-xs { padding: 3px 8px; font-size: 10px; }

        .main-container {
            display: flex;
            height: calc(100vh - 56px);
            margin-top: 56px;
        }

        .editor-panel {
            width: 420px;
            min-width: 300px;
            height: 100%;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
            position: relative;
            z-index: 100;
        }

        .resize-handle {
            position: absolute;
            right: -3px;
            top: 0;
            bottom: 0;
            width: 6px;
            cursor: col-resize;
            z-index: 10;
        }
        .resize-handle:hover, .resize-handle.active { background: var(--primary); opacity: 0.4; }

        .editor-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .editor-tabs {
            display: flex;
            gap: 2px;
            padding: 8px 12px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        .editor-tab {
            padding: 5px 10px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
            transition: all 0.2s;
            font-family: inherit;
            flex-shrink: 0;
        }
        .editor-tab:hover { background: var(--surface-hover); color: var(--text); }
        .editor-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        .editor-content {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            -webkit-overflow-scrolling: touch;
        }

        .form-section { display: none; }
        .form-section.active { display: block; }

        .form-group { margin-bottom: 12px; }
        .form-label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 8px 10px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 13px;
            background: var(--bg);
            color: var(--text);
            transition: all 0.2s;
            font-family: inherit;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .form-textarea { min-height: 70px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .photo-upload-area {
            width: 90px;
            height: 90px;
            border: 2px dashed var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            margin: 0 auto 14px;
            background: var(--bg);
            transition: all 0.2s;
            position: relative;
        }
        .photo-upload-area:hover { border-color: var(--primary); }
        .photo-upload-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .photo-upload-area .placeholder { text-align: center; color: var(--text-muted); font-size: 10px; z-index: 1; }
        .photo-upload-area .placeholder i { font-size: 22px; display: block; margin-bottom: 2px; }

        .list-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 8px;
            position: relative;
        }
        .list-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .list-item-title { font-weight: 700; font-size: 11px; color: var(--primary); }
        .list-item-actions { display: flex; gap: 4px; }
        .list-item-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 3px 5px;
            color: var(--text-muted);
            border-radius: 4px;
            font-size: 10px;
            transition: all 0.2s;
        }
        .list-item-actions button:hover { background: var(--surface-hover); color: var(--danger); }

        .add-item-btn {
            width: 100%;
            padding: 9px;
            background: transparent;
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.2s;
            font-size: 12px;
            font-family: inherit;
            margin-top: 4px;
        }
        .add-item-btn:hover { background: var(--surface-hover); border-color: var(--primary); }

        .preview-panel {
            flex: 1;
            height: 100%;
            background: #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .dark-mode .preview-panel { background: #1a1a2e; }

        .preview-toolbar {
            padding: 8px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
            flex-shrink: 0;
        }
        .preview-container {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .resume-page {
            width: 210mm;
            background: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            transition: transform 0.2s;
            transform-origin: top center;
            overflow: hidden;
            page-break-after: always;
        }
        .resume-page * { color: #1a1a1a !important; max-width: 100%; word-wrap: break-word; }

        .resume-content {
            padding: 20mm 18mm;
            font-family: 'Calibri', 'Segoe UI', sans-serif;
            font-size: 12px;
            line-height: 1.6;
        }

        /* RTE Toolbar */
        .rte-toolbar {
            display: none;
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px;
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            gap: 3px;
            flex-wrap: wrap;
            max-width: 350px;
        }
        .rte-toolbar.show { display: flex; }
        .rte-btn {
            padding: 5px 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 4px;
            color: var(--text);
            font-size: 12px;
            transition: all 0.2s;
        }
        .rte-btn:hover { background: var(--surface-hover); }
        .rte-select { padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; background: var(--bg); color: var(--text); }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal h3 { margin-bottom: 16px; font-size: 18px; }
        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin: 12px 0;
        }
        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--primary); }

        .style-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 12px 0;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 4000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--primary); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile */
        .mobile-edit-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 600;
            box-shadow: var(--shadow-lg);
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 1024px) {
            .editor-panel {
                position: fixed;
                left: 0;
                top: 56px;
                bottom: 0;
                z-index: 500;
                transform: translateX(-100%);
                width: 100%;
                max-width: 360px;
                transition: transform 0.3s;
            }
            .editor-panel.mobile-open { transform: translateX(0); }
            .mobile-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 499;
                top: 56px;
            }
            .mobile-overlay.show { display: block; }
            .preview-panel { width: 100%; }
            .preview-container { padding: 8px; }
            .resume-page { width: 100% !important; }
            .resume-content { padding: 10mm 6mm; }
            .resize-handle { display: none; }
            .mobile-edit-btn { display: flex; }
            .nav-bar { padding: 0 8px; }
        }

        @media (max-width: 640px) {
            .nav-brand span { font-size: 13px; }
            .nav-actions .btn span { display: none; }
            .nav-actions { gap: 2px; }
            .btn { padding: 6px 8px; }
            .btn-icon { width: 30px; height: 30px; }
            .editor-tabs { padding: 6px; gap: 1px; }
            .editor-tab { padding: 4px 7px; font-size: 10px; }
            .form-row { grid-template-columns: 1fr; }
            .preview-toolbar { padding: 6px 8px; gap: 4px; }
            .color-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-bar">
        <div class="nav-brand">
            <i class="fas fa-file-alt"></i>
            <span>OpenSource Resume Builder</span>
        </div>
        <div class="nav-actions">
            <button class="btn btn-icon" onclick="undoAction()" title="Undo (Ctrl+Z)"><i class="fas fa-undo"></i></button>
            <button class="btn btn-icon" onclick="redoAction()" title="Redo (Ctrl+Y)"><i class="fas fa-redo"></i></button>
            <button class="btn btn-sm" onclick="importCV()"><i class="fas fa-upload"></i><span>Import</span></button>
            <input type="file" id="cvImport" style="display:none" accept=".pdf,.docx,.txt" onchange="handleCVImport(event)">
            <button class="btn btn-sm" onclick="showThemeModal()"><i class="fas fa-palette"></i><span>Theme</span></button>
            <button class="btn btn-sm" onclick="showStyleModal()"><i class="fas fa-font"></i><span>Style</span></button>
            <button class="btn btn-icon" onclick="toggleDarkMode()"><i class="fas fa-moon" id="darkIcon"></i></button>
            <button class="btn btn-primary btn-sm" onclick="showDownloadModal()"><i class="fas fa-download"></i><span>Download</span></button>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Editor Panel -->
        <div class="editor-panel" id="editorPanel">
            <div class="resize-handle" id="resizeHandle"></div>
            <div class="editor-header">
                <h3 style="font-size:13px;font-weight:700;">Resume Editor</h3>
                <button class="btn btn-icon btn-xs" onclick="toggleEditorMobile()" style="display:none;" id="closeEditorBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="editor-tabs" id="editorTabs">
                <button class="editor-tab active" data-section="personal">Personal</button>
                <button class="editor-tab" data-section="summary">Summary</button>
                <button class="editor-tab" data-section="experience">Experience</button>
                <button class="editor-tab" data-section="education">Education</button>
                <button class="editor-tab" data-section="skills">Skills</button>
                <button class="editor-tab" data-section="projects">Projects</button>
                <button class="editor-tab" data-section="certifications">Certs</button>
                <button class="editor-tab" data-section="languages">Languages</button>
                <button class="editor-tab" data-section="custom">Custom</button>
            </div>
            <div class="editor-content" id="editorContent">
                <!-- Personal Section -->
                <div class="form-section active" id="section-personal">
                    <div class="photo-upload-area" onclick="document.getElementById('photoUpload').click()">
                        <img id="photoPreview" src="" style="display:none;">
                        <div class="placeholder" id="photoPlaceholder"><i class="fas fa-camera"></i><span>Photo</span></div>
                    </div>
                    <input type="file" id="photoUpload" accept=".png,.jpg,.jpeg,.webp" style="display:none" onchange="handlePhotoUpload(event)">
                    <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="fullName" placeholder="John Doe" oninput="updateField('personal.fullName', this.value)"></div>
                    <div class="form-group"><label class="form-label">Professional Title</label><input type="text" class="form-input" id="currentTitle" placeholder="Senior Software Engineer" oninput="updateField('summary.currentTitle', this.value)"></div>
                    <div class="form-group"><label class="form-label">Date of Birth</label><input type="text" class="form-input" id="dob" placeholder="DD/MM/YYYY or MM/YYYY or YYYY" oninput="updateField('personal.dob', this.value)"></div>
                    <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="email" placeholder="john@example.com" oninput="updateField('personal.email', this.value)"></div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input" id="phone" placeholder="+1 234 567 8900" oninput="updateField('personal.phone', this.value)"></div>
                        <div class="form-group"><label class="form-label">Alt Phone</label><input type="tel" class="form-input" id="altPhone" placeholder="+1 234 567 8901" oninput="updateField('personal.altPhone', this.value)"></div>
                    </div>
                    <div class="form-group"><label class="form-label">Location</label><input type="text" class="form-input" id="city" placeholder="City, State, Country" oninput="updateField('personal.city', this.value)"></div>
                    <div class="form-group"><label class="form-label">LinkedIn</label><input type="url" class="form-input" id="linkedin" placeholder="https://linkedin.com/in/username" oninput="updateField('personal.linkedin', this.value)"></div>
                    <div class="form-group"><label class="form-label">GitHub</label><input type="url" class="form-input" id="github" placeholder="https://github.com/username" oninput="updateField('personal.github', this.value)"></div>
                    <div class="form-group"><label class="form-label">Portfolio</label><input type="url" class="form-input" id="portfolio" placeholder="https://yourwebsite.com" oninput="updateField('personal.portfolio', this.value)"></div>
                </div>
                <!-- Other Sections -->
                <div class="form-section" id="section-summary">
                    <div class="form-group"><label class="form-label">Career Objective</label><textarea class="form-textarea rte-enabled" id="careerObjective" placeholder="Write a compelling professional summary..." oninput="updateField('summary.careerObjective', this.value)"></textarea></div>
                    <div class="form-group"><label class="form-label">Years of Experience</label><input type="text" class="form-input" id="totalExp" placeholder="5+ years" oninput="updateField('summary.totalExp', this.value)"></div>
                    <div class="form-group"><label class="form-label">Key Technical Skills</label><textarea class="form-textarea rte-enabled" id="keyTechSkills" placeholder="JavaScript, Python, React, Node.js..." oninput="updateField('summary.keyTechSkills', this.value)"></textarea></div>
                </div>
                <div class="form-section" id="section-experience"><div id="experienceList"></div><button class="add-item-btn" onclick="addExperience()"><i class="fas fa-plus"></i> Add Work Experience</button></div>
                <div class="form-section" id="section-education"><div id="educationList"></div><button class="add-item-btn" onclick="addEducation()"><i class="fas fa-plus"></i> Add Education</button></div>
                <div class="form-section" id="section-skills">
                    <div class="form-group"><label class="form-label">Programming Languages</label><textarea class="form-textarea rte-enabled" id="progLanguages" placeholder="Python, Java, JavaScript, C++..." oninput="updateSkills()"></textarea></div>
                    <div class="form-group"><label class="form-label">Frameworks & Libraries</label><textarea class="form-textarea rte-enabled" id="frameworks" placeholder="React, Django, Node.js..." oninput="updateSkills()"></textarea></div>
                    <div class="form-group"><label class="form-label">Tools & Technologies</label><textarea class="form-textarea rte-enabled" id="tools" placeholder="Git, Docker, AWS..." oninput="updateSkills()"></textarea></div>
                    <div class="form-group"><label class="form-label">Databases</label><textarea class="form-textarea rte-enabled" id="databases" placeholder="MySQL, PostgreSQL, MongoDB..." oninput="updateSkills()"></textarea></div>
                    <div class="form-group"><label class="form-label">Soft Skills</label><textarea class="form-textarea rte-enabled" id="softSkills" placeholder="Leadership, Communication..." oninput="updateSkills()"></textarea></div>
                </div>
                <div class="form-section" id="section-projects"><div id="projectsList"></div><button class="add-item-btn" onclick="addProject()"><i class="fas fa-plus"></i> Add Project</button></div>
                <div class="form-section" id="section-certifications"><div id="certificationsList"></div><button class="add-item-btn" onclick="addCertification()"><i class="fas fa-plus"></i> Add Certification</button></div>
                <div class="form-section" id="section-languages"><div id="languagesList"></div><button class="add-item-btn" onclick="addLanguage()"><i class="fas fa-plus"></i> Add Language</button></div>

    <script>
        // ============ INITIALIZATION ============
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const GEMINI_API_KEY = 'AIzaSyDZo6Qm2OG1Q4JFCzXGzGHFJfXvQz3Vq6c';
        const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';

        const DEFAULT_DATA = {
            photo: '',
            template: 'modern',
            resumeTheme: '#6366f1',
            style: {
                fontFamily: 'Calibri, sans-serif',
                fontSize: '12',
                headingSize: '16',
                bulletStyle: 'disc'
            },
            personal: { fullName: '', dob: '', email: '', phone: '', altPhone: '', city: '', linkedin: '', github: '', portfolio: '' },
            summary: { currentTitle: '', careerObjective: '', totalExp: '', keyTechSkills: '' },
            experience: [],
            education: [],
            skills: { languages: '', frameworks: '', tools: '', databases: '', softSkills: '' },
            projects: [],
            certifications: [],
            languages: [],
            customSections: []
        };

        let resumeData = JSON.parse(JSON.stringify(DEFAULT_DATA));
        let undoStack = [];
        let redoStack = [];
        let currentZoom = 100;
        const MAX_UNDO = 100;

        function init() {
            loadSavedData();
            setupTabs();
            setupResize();
            setupKeyboardShortcuts();
            setupRTE();
            renderAllLists();
            updatePreview();
            buildThemeColorGrid();
            
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkIcon').className = 'fas fa-sun';
            }

            // Show close button on mobile
            if (window.innerWidth <= 1024) {
                document.getElementById('closeEditorBtn').style.display = 'flex';
            }
        }

        function loadSavedData() {
            const saved = localStorage.getItem('resumeData');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    resumeData = deepMerge(JSON.parse(JSON.stringify(DEFAULT_DATA)), parsed);
                    populateAllFields();
                    updatePreview();
                } catch (e) {
                    console.error('Load error:', e);
                }
            }
        }

        function deepMerge(target, source) {
            const output = { ...target };
            for (const key in source) {
                if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key]) {
                    output[key] = deepMerge(target[key], source[key]);
                } else {
                    output[key] = source[key];
                }
            }
            return output;
        }

        function saveToLocalStorage() {
            try {
                localStorage.setItem('resumeData', JSON.stringify(resumeData));
            } catch (e) {
                showToast('Storage full. Clear some data.', 'error');
            }
        }

        // ============ UNDO/REDO ============
        function pushState() {
            undoStack.push(JSON.parse(JSON.stringify(resumeData)));
            if (undoStack.length > MAX_UNDO) undoStack.shift();
            redoStack = [];
        }

        function undoAction() {
            if (undoStack.length === 0) { showToast('Nothing to undo', 'info'); return; }
            redoStack.push(JSON.parse(JSON.stringify(resumeData)));
            resumeData = undoStack.pop();
            populateAllFields();
            updatePreview();
            saveToLocalStorage();
            showToast('Undone', 'info');
        }

        function redoAction() {
            if (redoStack.length === 0) { showToast('Nothing to redo', 'info'); return; }
            undoStack.push(JSON.parse(JSON.stringify(resumeData)));
            resumeData = redoStack.pop();
            populateAllFields();
            updatePreview();
            saveToLocalStorage();
            showToast('Redone', 'info');
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
                    e.preventDefault();
                    undoAction();
                }
                if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
                    e.preventDefault();
                    redoAction();
                }
            });
        }

        // ============ FIELD UPDATES ============
        function updateField(path, value) {
            pushState();
            const keys = path.split('.');
            let obj = resumeData;
            for (let i = 0; i < keys.length - 1; i++) {
                if (!obj[keys[i]]) obj[keys[i]] = {};
                obj = obj[keys[i]];
            }
            obj[keys[keys.length - 1]] = value;
            updatePreview();
            saveToLocalStorage();
        }

        function updateSkills() {
            pushState();
            resumeData.skills.languages = document.getElementById('progLanguages')?.value || '';
            resumeData.skills.frameworks = document.getElementById('frameworks')?.value || '';
            resumeData.skills.tools = document.getElementById('tools')?.value || '';
            resumeData.skills.databases = document.getElementById('databases')?.value || '';
            resumeData.skills.softSkills = document.getElementById('softSkills')?.value || '';
            updatePreview();
            saveToLocalStorage();
        }

        function populateAllFields() {
            const fieldMap = {
                'fullName': 'personal.fullName', 'currentTitle': 'summary.currentTitle', 'dob': 'personal.dob',
                'email': 'personal.email', 'phone': 'personal.phone', 'altPhone': 'personal.altPhone',
                'city': 'personal.city', 'linkedin': 'personal.linkedin', 'github': 'personal.github',
                'portfolio': 'personal.portfolio', 'careerObjective': 'summary.careerObjective',
                'totalExp': 'summary.totalExp', 'keyTechSkills': 'summary.keyTechSkills',
                'progLanguages': 'skills.languages', 'frameworks': 'skills.frameworks',
                'tools': 'skills.tools', 'databases': 'skills.databases', 'softSkills': 'skills.softSkills'
            };

            Object.entries(fieldMap).forEach(([id, path]) => {
                const el = document.getElementById(id);
                if (!el) return;
                const keys = path.split('.');
                let val = resumeData;
                for (const k of keys) val = val?.[k];
                el.value = val || '';
            });

            // Photo
            const pp = document.getElementById('photoPreview');
            const ph = document.getElementById('photoPlaceholder');
            if (resumeData.photo) {
                pp.src = resumeData.photo;
                pp.style.display = 'block';
                ph.style.display = 'none';
            } else {
                pp.style.display = 'none';
                ph.style.display = '';
            }

            // Template
            const ts = document.getElementById('templateSelect');
            if (ts) ts.value = resumeData.template;

            // Style
            if (resumeData.style) {
                const sf = document.getElementById('styleFontFamily');
                const sfs = document.getElementById('styleFontSize');
                const shs = document.getElementById('styleHeadingSize');
                const sb = document.getElementById('styleBullet');
                if (sf) sf.value = resumeData.style.fontFamily || 'Calibri, sans-serif';
                if (sfs) sfs.value = resumeData.style.fontSize || '12';
                if (shs) shs.value = resumeData.style.headingSize || '16';
                if (sb) sb.value = resumeData.style.bulletStyle || 'disc';
            }

            document.getElementById('currentThemeColor').textContent = resumeData.resumeTheme;
            updateThemeColorActive();
            renderAllLists();
        }

        // ============ TABS ============
        function setupTabs() {
            document.querySelectorAll('.editor-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
                    const section = document.getElementById('section-' + this.dataset.section);
                    if (section) section.classList.add('active');
                });
            });
        }

        // ============ RESIZE ============
        function setupResize() {
            const handle = document.getElementById('resizeHandle');
            const panel = document.getElementById('editorPanel');
            let isResizing = false, startX, startWidth;

            handle.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startWidth = panel.offsetWidth;
                handle.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const newWidth = Math.max(280, Math.min(700, startWidth + (e.clientX - startX)));
                panel.style.width = newWidth + 'px';
                panel.style.minWidth = newWidth + 'px';
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    handle.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        // ============ RTE ============
        let activeRTE = null;

        function setupRTE() {
            document.addEventListener('focusin', (e) => {
                if (e.target.classList.contains('rte-enabled') || e.target.closest('.rte-enabled')) {
                    activeRTE = e.target;
                    const toolbar = document.getElementById('rteToolbar');
                    const rect = e.target.getBoundingClientRect();
                    toolbar.style.top = (rect.top - 50) + 'px';
                    toolbar.style.left = Math.min(rect.left, window.innerWidth - 360) + 'px';
                    toolbar.classList.add('show');
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.rte-enabled') && !e.target.closest('#rteToolbar')) {
                    document.getElementById('rteToolbar').classList.remove('show');
                    activeRTE = null;
                }
            });
        }

        function execRTE(command, value = null) {
            if (activeRTE) {
                activeRTE.focus();
                document.execCommand(command, false, value);
                activeRTE.dispatchEvent(new Event('input', { bubbles: true }));
            }
        }

        // ============ PHOTO UPLOAD ============
        function handlePhotoUpload(event) {
            const file = event.target.files?.[0];
            if (!file) return;
            if (!['image/png', 'image/jpeg', 'image/webp'].includes(file.type)) {
                showToast('Please use PNG, JPG, or WebP', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Create a square crop from center
                    const size = Math.min(img.width, img.height);
                    const sx = (img.width - size) / 2;
                    const sy = (img.height - size) / 2;
                    const canvas = document.createElement('canvas');
                    canvas.width = 200;
                    canvas.height = 200;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, sx, sy, size, size, 0, 0, 200, 200);
                    
                    pushState();
                    resumeData.photo = canvas.toDataURL('image/jpeg', 0.9);
                    document.getElementById('photoPreview').src = resumeData.photo;
                    document.getElementById('photoPreview').style.display = 'block';
                    document.getElementById('photoPlaceholder').style.display = 'none';
                    updatePreview();
                    saveToLocalStorage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        // ============ DYNAMIC LISTS ============
        function addExperience() {

                    <div class="form-row">

                    </div>
                    <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea rte-enabled" rows="2" onchange="updateExpField(${e.id},'description',this.value)">${escHtml(e.description)}</textarea></div>

        function addEducation() {

        function escHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ============ PREVIEW ENGINE ============
        function updatePreview() {
            const container = document.getElementById('resumePages');
            if (!container) return;

            const data = resumeData;
            const theme = data.resumeTheme || '#6366f1';
            const style = data.style || DEFAULT_DATA.style;
            const hasData = checkHasData(data);

            if (!hasData) {
                container.innerHTML = `<div style="text-align:center;padding:80px 40px;color:#999;">
                    <i class="fas fa-file-alt" style="font-size:64px;display:block;margin-bottom:20px;opacity:0.3;"></i>
                    <h2 style="color:#999;font-weight:300;">Your Resume Preview</h2>
                    <p style="color:#bbb;">Fill in your details to see the live preview</p>
                </div>`;
                return;
            }

            const generators = {
                'modern': genModern,
                'minimal': genMinimal,
                'creative': genCreative,
                'classic': genClassic,
                'executive': genExecutive
            };

            const gen = generators[data.template] || genModern;
            const fullHTML = gen(data, theme, style);
            
            // Split into pages if content is long
            const pages = splitIntoPages(fullHTML, style);
            container.innerHTML = pages.map((pageHTML, i) => `
                <div class="resume-page" style="margin-bottom:20px;${i > 0 ? 'margin-top:20px;' : ''}">
                    <div class="resume-content" style="font-family:${style.fontFamily};font-size:${style.fontSize}px;">${pageHTML}</div>
                </div>
            `).join('');

            // Apply zoom
            document.querySelectorAll('.resume-page').forEach(page => {
                page.style.transform = `scale(${currentZoom/100})`;
            });
        }

        function splitIntoPages(html, style) {
            // Simple heuristic: if content is very long, split at section boundaries
            const sections = html.split(/(?=<div style="margin-bottom:)/);
            if (sections.length <= 8) return [html];
            
            const pages = [];
            let currentPage = '';
            let sectionCount = 0;
            const maxSectionsPerPage = 7;
            
            for (const section of sections) {
                if (sectionCount >= maxSectionsPerPage && section.trim()) {
                    pages.push(currentPage);
                    currentPage = section;
                    sectionCount = 1;
                } else {
                    currentPage += section;
                    sectionCount++;
                }
            }
            if (currentPage.trim()) pages.push(currentPage);
            
            return pages.length > 0 ? pages : [html];
        }

        function checkHasData(data) {
            return data.personal.fullName || data.personal.email || data.summary.careerObjective ||
                data.experience.some(e => e.company || e.title) ||
                data.education.some(e => e.school || e.degree) ||
                data.skills.languages || data.skills.frameworks || data.skills.tools ||
                data.projects.some(p => p.name) ||
                data.certifications.some(c => c.name) ||
                data.languages.some(l => l.name) ||
                data.customSections.some(s => s.items.some(i => i.title)) ||
                data.photo;
        }

        function getBulletChar(style) {
            const map = { 'disc': '•', 'square': '▪', 'dash': '—', 'arrow': '→' };
            return map[style] || '•';
        }

        function sectionHTML(title, content, theme, style) {
            const hSize = parseInt(style.headingSize) || 16;
            return `<div style="margin-bottom:16px;">
                <h2 style="font-size:${hSize}px;text-transform:uppercase;letter-spacing:1.5px;border-bottom:2px solid ${theme};padding-bottom:5px;margin-bottom:10px;color:${theme};">${title}</h2>
                ${content}
            </div>`;
        }

        function genModern(data, theme, style) {
            let h = '';
            if (data.photo) h += `<div style="text-align:center;margin-bottom:14px;"><img src="${data.photo}" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid ${theme};"></div>`;
            h += `<h1 style="font-size:${parseInt(style.headingSize)+8}px;text-align:center;margin-bottom:3px;">${escHtml(data.personal.fullName) || 'Your Name'}</h1>`;
            h += `<p style="text-align:center;font-size:${parseInt(style.fontSize)+2}px;color:${theme};font-weight:600;">${escHtml(data.summary.currentTitle) || ''}</p>`;
            
            const contacts = [data.personal.email, data.personal.phone, data.personal.altPhone, data.personal.city, data.personal.linkedin].filter(Boolean);
            if (contacts.length) h += `<p style="text-align:center;font-size:${parseInt(style.fontSize)-1}px;color:#666;margin:8px 0;">${contacts.join(' | ')}</p>`;
            h += `<hr style="border:none;border-top:2px solid ${theme};margin:14px 0;">`;

            if (data.summary.careerObjective) h += sectionHTML('Professional Summary', `<p style="line-height:1.7;">${escHtml(data.summary.careerObjective)}</p>`, theme, style);
            
            if (data.experience.some(e => e.company || e.title)) {
                let ex = '';
                data.experience.forEach(e => {
                    if (e.company || e.title) ex += `<div style="margin-bottom:10px;"><h3 style="font-size:${parseInt(style.fontSize)+1}px;color:${theme};">${escHtml(e.title||'')}${e.company?' - '+escHtml(e.company):''}</h3><p style="font-size:${parseInt(style.fontSize)-1}px;color:#888;">${escHtml(e.startDate||'')} ${e.endDate?'- '+escHtml(e.endDate):''}</p><p>${escHtml(e.description||'')}</p></div>`;
                });
                h += sectionHTML('Experience', ex, theme, style);
            }

            if (data.education.some(e => e.school || e.degree)) {
                let ed = data.education.filter(e => e.school || e.degree).map(e => `<p style="margin-bottom:3px;"><strong>${escHtml(e.degree||'')}${e.field?' in '+escHtml(e.field):''}</strong> - ${escHtml(e.school||'')} (${escHtml(e.graduationYear||'')})</p>`).join('');
                h += sectionHTML('Education', ed, theme, style);
            }

            const skillLines = [];
            if (data.skills.languages) skillLines.push(`<strong>Languages:</strong> ${escHtml(data.skills.languages)}`);
            if (data.skills.frameworks) skillLines.push(`<strong>Frameworks:</strong> ${escHtml(data.skills.frameworks)}`);
            if (data.skills.tools) skillLines.push(`<strong>Tools:</strong> ${escHtml(data.skills.tools)}`);
            if (data.skills.databases) skillLines.push(`<strong>Databases:</strong> ${escHtml(data.skills.databases)}`);
            if (data.skills.softSkills) skillLines.push(`<strong>Soft Skills:</strong> ${escHtml(data.skills.softSkills)}`);
            if (skillLines.length) h += sectionHTML('Skills', `<p style="line-height:2;">${skillLines.join('<br>')}</p>`, theme, style);

            if (data.projects.some(p => p.name)) {
                let pr = data.projects.filter(p => p.name).map(p => `<div style="margin-bottom:6px;"><h3 style="font-size:${parseInt(style.fontSize)+1}px;color:${theme};">${escHtml(p.name)}</h3><p>${escHtml(p.description||'')}</p><p style="font-size:${parseInt(style.fontSize)-1}px;color:#888;">${escHtml(p.technologies||'')}</p></div>`).join('');
                h += sectionHTML('Projects', pr, theme, style);
            }

            if (data.certifications.some(c => c.name)) {
                let ce = data.certifications.filter(c => c.name).map(c => `<p style="margin-bottom:2px;">${getBulletChar(style.bulletStyle)} <strong>${escHtml(c.name)}</strong> - ${escHtml(c.organization||'')} (${escHtml(c.date||'')})</p>`).join('');
                h += sectionHTML('Certifications', ce, theme, style);
            }

            if (data.languages.some(l => l.name)) {
                h += sectionHTML('Languages', `<p>${data.languages.filter(l=>l.name).map(l=>`${escHtml(l.name)} (${escHtml(l.proficiency||'N/A')})`).join(' • ')}</p>`, theme, style);
            }

            data.customSections.forEach(s => {
                let items = s.items.filter(i=>i.title).map(i => `<div style="margin-bottom:4px;"><h3 style="font-size:${parseInt(style.fontSize)+1}px;color:${theme};">${escHtml(i.title)}</h3><p>${escHtml(i.description||'')}</p></div>`).join('');
                if (items) h += sectionHTML(s.name, items, theme, style);
            });

            return h;
        }

        function genMinimal(data, theme, style) {
            let h = '<div style="display:flex;gap:20px;">';
            h += '<div style="width:30%;background:#f8f9fa;padding:16px;border-radius:4px;">';

            h += `<h1 style="font-size:${parseInt(style.headingSize)}px;">${escHtml(data.personal.fullName)||'Name'}</h1>`;

            }
            h += '</div><div style="width:70%;padding:16px 0;">';
            if (data.summary.careerObjective) h += sectionHTML('Summary', `<p style="line-height:1.6;">${escHtml(data.summary.careerObjective)}</p>`, theme, style);
            if (data.experience.some(e=>e.company||e.title)) {
                let ex = data.experience.filter(e=>e.company||e.title).map(e => `<div style="margin-bottom:8px;"><h3 style="font-size:${parseInt(style.fontSize)}px;">${escHtml(e.title||'')} - ${escHtml(e.company||'')}</h3><p style="font-size:${parseInt(style.fontSize)-2}px;color:#999;">${escHtml(e.startDate||'')} - ${escHtml(e.endDate||'Present')}</p><p style="font-size:${parseInt(style.fontSize)-1}px;">${escHtml(e.description||'')}</p></div>`).join('');
                h += sectionHTML('Experience', ex, theme, style);
            }
            if (data.education.some(e=>e.school||e.degree)) {
                let ed = data.education.filter(e=>e.school||e.degree).map(e => `<p style="font-size:${parseInt(style.fontSize)-1}px;"><strong>${escHtml(e.degree||'')}</strong> - ${escHtml(e.school||'')} (${escHtml(e.graduationYear||'')})</p>`).join('');
                h += sectionHTML('Education', ed, theme, style);
            }
            // Add remaining sections to right column
            if (data.projects.some(p=>p.name)) {
                let pr = data.projects.filter(p=>p.name).map(p => `<div style="margin-bottom:4px;"><strong>${escHtml(p.name)}</strong><p style="font-size:${parseInt(style.fontSize)-1}px;">${escHtml(p.description||'')}</p></div>`).join('');
                h += sectionHTML('Projects', pr, theme, style);
            }
            if (data.certifications.some(c=>c.name)) {
                let ce = data.certifications.filter(c=>c.name).map(c => `<p style="font-size:${parseInt(style.fontSize)-1}px;">${getBulletChar(style.bulletStyle)} ${escHtml(c.name)} - ${escHtml(c.organization||'')}</p>`).join('');
                h += sectionHTML('Certifications', ce, theme, style);
            }
            if (data.languages.some(l=>l.name)) {
                h += sectionHTML('Languages', `<p style="font-size:${parseInt(style.fontSize)-1}px;">${data.languages.filter(l=>l.name).map(l=>`${escHtml(l.name)} (${escHtml(l.proficiency||'')})`).join(' • ')}</p>`, theme, style);

                if (items) h += sectionHTML(s.name, items, theme, style);

            h += '</div></div>';

            let h = '<div style="text-align:center;">';
            h += `<h1 style="font-size:${parseInt(style.headingSize)+4}px;text-transform:uppercase;letter-spacing:2px;">${escHtml(data.personal.fullName)||'Your Name'}</h1>`;
            if (data.summary.currentTitle) h += `<p style="font-size:${parseInt(style.fontSize)}px;">${escHtml(data.summary.currentTitle)}</p>`;
            const contacts = [data.personal.email, data.personal.phone, data.personal.city, data.personal.linkedin].filter(Boolean);
            if (contacts.length) h += `<p style="font-size:${parseInt(style.fontSize)-2}px;margin:6px 0;">${contacts.join(' • ')}</p>`;
            h += `<hr style="border:1px solid ${theme};">`;
            if (data.summary.careerObjective) h += `<div style="text-align:left;margin:12px 0;"><h2 style="font-size:${parseInt(style.headingSize)}px;text-align:center;text-transform:uppercase;">Objective</h2><p style="line-height:1.6;">${escHtml(data.summary.careerObjective)}</p></div>`;
            if (data.experience.some(e=>e.company||e.title)) {
                let ex = data.experience.filter(e=>e.company||e.title).map(e => `<div style="text-align:left;margin-bottom:8px;"><p style="font-weight:bold;">${escHtml(e.title||'')} - ${escHtml(e.company||'')}</p><p style="font-style:italic;font-size:${parseInt(style.fontSize)-1}px;">${escHtml(e.startDate||'')} to ${escHtml(e.endDate||'Present')}</p><p>${escHtml(e.description||'')}</p></div>`).join('');
                h += `<div style="text-align:left;"><h2 style="font-size:${parseInt(style.headingSize)}px;text-align:center;text-transform:uppercase;">Experience</h2>${ex}</div>`;
            }
            if (data.education.some(e=>e.school||e.degree)) {
                let ed = data.education.filter(e=>e.school||e.degree).map(e => `<p style="text-align:left;"><strong>${escHtml(e.degree||'')}</strong> - ${escHtml(e.school||'')} (${escHtml(e.graduationYear||'')})</p>`).join('');
                h += `<div style="text-align:left;"><h2 style="font-size:${parseInt(style.headingSize)}px;text-align:center;text-transform:uppercase;">Education</h2>${ed}</div>`;
            }
            h += '</div>';
            return h;
        }

        function genExecutive(data, theme, style) {
            let h = '';
            h += `<div style="border-bottom:3px solid ${theme};padding-bottom:10px;margin-bottom:14px;">`;
            if (data.photo) h += `<img src="${data.photo}" style="width:75px;height:75px;border-radius:4px;object-fit:cover;float:right;margin-left:10px;">`;
            h += `<h1 style="font-size:${parseInt(style.headingSize)+6}px;color:#1a3a5c;">${escHtml(data.personal.fullName)||'Your Name'}</h1>`;
            h += `<p style="font-size:${parseInt(style.fontSize)+1}px;color:#555;">${escHtml(data.summary.currentTitle)||'Professional'}</p>`;
            const contacts = [data.personal.email, data.personal.phone, data.personal.linkedin].filter(Boolean);
            if (contacts.length) h += `<p style="font-size:${parseInt(style.fontSize)-2}px;color:#777;margin-top:3px;">${contacts.join(' • ')}</p>`;
            h += '<div style="clear:both;"></div></div>';

            if (data.summary.careerObjective) h += sectionHTML('Executive Summary', `<p style="line-height:1.7;">${escHtml(data.summary.careerObjective)}</p>`, theme, style);
            
            if (data.experience.some(e=>e.company||e.title)) {
                let ex = data.experience.filter(e=>e.company||e.title).map(e => `<div style="margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee;"><div style="display:flex;justify-content:space-between;"><h3 style="font-size:${parseInt(style.fontSize)+1}px;">${escHtml(e.title||'')}</h3><span style="font-size:${parseInt(style.fontSize)-1}px;color:#999;">${escHtml(e.startDate||'')} - ${escHtml(e.endDate||'Present')}</span></div><p style="color:#555;">${escHtml(e.company||'')}</p><p>${escHtml(e.description||'')}</p></div>`).join('');
                h += sectionHTML('Professional Experience', ex, theme, style);
            }

            if (data.education.some(e=>e.school||e.degree)) {
                let ed = data.education.filter(e=>e.school||e.degree).map(e => `<p style="margin-bottom:3px;"><strong>${escHtml(e.degree||'')}${e.field?' in '+escHtml(e.field):''}</strong> - ${escHtml(e.school||'')} (${escHtml(e.graduationYear||'')})</p>`).join('');
                h += sectionHTML('Education', ed, theme, style);
            }

            return h;
        }

        // ============ STYLE & THEME ============
        function updateStyle(property, value) {
            pushState();
            if (!resumeData.style) resumeData.style = { ...DEFAULT_DATA.style };
            resumeData.style[property] = value;
            updatePreview();
            saveToLocalStorage();
            showToast('Style updated', 'info');
        }

        function setResumeTheme(color) {
            pushState();
            resumeData.resumeTheme = color;
            localStorage.setItem('resumeTheme', color);
            document.getElementById('currentThemeColor').textContent = color;
            updateThemeColorActive();
            updatePreview();
            saveToLocalStorage();
            showToast('Theme color updated', 'info');
        }

        function buildThemeColorGrid() {
            const grid = document.getElementById('themeColorGrid');
            if (!grid) return;
            
            const colors = [
                '#6366f1','#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6',
                '#ec4899','#06b6d4','#84cc16','#f97316','#6b7280','#1e293b',
                '#a78bfa','#60a5fa','#34d399','#fbbf24','#f87171','#c084fc',
                '#f9a8d4','#67e8f9','#bef264','#fdba74','#9ca3af','#475569',
                '#c4b5fd','#93c5fd','#6ee7b7','#fde68a','#fca5a5','#d8b4fe',
                '#e9d5ff','#bfdbfe','#a7f3d0','#fef3c7','#fecaca','#e9d5ff'
            ];
            
            grid.innerHTML = colors.map(c => `
                <div class="color-swatch ${resumeData.resumeTheme === c ? 'active' : ''}" 
                     style="background:${c};"

        }

        function updateThemeColorActive() {
            document.querySelectorAll('.color-swatch').forEach(sw => {
                sw.classList.toggle('active', sw.style.backgroundColor === resumeData.resumeTheme || 
                    (sw.style.backgroundColor === 'rgb(99, 102, 241)' && resumeData.resumeTheme === '#6366f1'));
            });
        }

        function changeTemplate(template) {
            pushState();
            resumeData.template = template;
            updatePreview();
            saveToLocalStorage();
            showToast(`Template: ${template}`, 'info');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('darkIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        // ============ ZOOM ============
        function zoomPreview(change) {
            currentZoom = Math.max(40, Math.min(200, currentZoom + change));
            document.getElementById('zoomLevel').textContent = `${currentZoom}%`;
            document.querySelectorAll('.resume-page').forEach(page => {
                page.style.transform = `scale(${currentZoom/100})`;
            });
        }

        // ============ MODALS ============
        function showThemeModal() { document.getElementById('themeModal').style.display = 'flex'; buildThemeColorGrid(); }
        function closeThemeModal() { document.getElementById('themeModal').style.display = 'none'; }
        function showStyleModal() { document.getElementById('styleModal').style.display = 'flex'; }
        function closeStyleModal() { document.getElementById('styleModal').style.display = 'none'; }
        function showDownloadModal() { document.getElementById('downloadModal').style.display = 'flex'; }
        function closeDownloadModal() { document.getElementById('downloadModal').style.display = 'none'; }

        // Close modals on overlay click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.style.display = 'none';
            }
        });

        // ============ IMPORT CV WITH GEMINI AI ============
        function importCV() {
            document.getElementById('cvImport').click();
        }

        async function handleCVImport(event) {
            const file = event.target.files?.[0];
            if (!file) return;
            event.target.value = '';
            
            showToast('Extracting text from CV...', 'info');
            
            try {
                let text = '';
                
                if (file.name.endsWith('.txt')) {
                    text = await file.text();
                } else if (file.name.endsWith('.docx')) {
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await mammoth.extractRawText({ arrayBuffer });
                    text = result.value;
                } else if (file.name.endsWith('.pdf')) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(' ') + '\n';
                    }
                } else {
                    showToast('Unsupported format. Use PDF, DOCX, or TXT.', 'error');
                    return;
                }
                
                if (text.trim().length < 20) {
                    showToast('Could not extract enough text.', 'error');
                    return;
                }
                
                // Try Gemini AI first, fallback to local parser
                showToast('Analyzing with AI...', 'info');
                const aiResult = await parseWithGemini(text);
                
                if (aiResult) {
                    applyParsedData(aiResult);
                    showToast('CV imported successfully with AI!', 'success');
                } else {
                    // Fallback to local parser
                    showToast('AI unavailable, using local parser...', 'info');
                    parseCVLocal(text);
                    showToast('CV imported! Please review.', 'success');
                }
            } catch (error) {
                console.error('Import error:', error);
                showToast('Error importing CV. Try a different file.', 'error');
            }
        }

        async function parseWithGemini(text) {
            try {
                const prompt = `You are a CV parser. Extract the following information from this CV text and return ONLY valid JSON. Use empty strings for missing fields.

{
  "personal": {
    "fullName": "",
    "email": "",
    "phone": "",
    "altPhone": "",
    "city": "",
    "linkedin": "",
    "github": "",
    "portfolio": ""
  },
  "summary": {
    "currentTitle": "",
    "careerObjective": ""
  },
  "experience": [
    {"company": "", "title": "", "startDate": "", "endDate": "", "description": ""}
  ],
  "education": [
    {"school": "", "degree": "", "field": "", "graduationYear": ""}
  ],
  "skills": {
    "languages": "",
    "frameworks": "",
    "tools": "",
    "databases": "",
    "softSkills": ""
  },
  "projects": [
    {"name": "", "description": "", "technologies": ""}
  ],
  "certifications": [
    {"name": "", "organization": "", "date": ""}
  ],
  "languages": [
    {"name": "", "proficiency": ""}
  ]
}

CV Text:
${text.substring(0, 15000)}`;

                const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: prompt }]
                        }]
                    })
                });

                if (!response.ok) {
                    console.warn('Gemini API error:', response.status);
                    return null;
                }

                const data = await response.json();
                const responseText = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
                
                // Extract JSON from response
                const jsonMatch = responseText.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    return JSON.parse(jsonMatch[0]);
                }
                return null;
            } catch (error) {
                console.warn('Gemini API failed, using local parser:', error);
                return null;
            }
        }

        function applyParsedData(parsed) {
            pushState();
            
            if (parsed.personal) {
                resumeData.personal = { ...resumeData.personal, ...parsed.personal };
            }
            if (parsed.summary) {
                resumeData.summary = { ...resumeData.summary, ...parsed.summary };
            }
            if (parsed.experience && Array.isArray(parsed.experience)) {
                resumeData.experience = parsed.experience.map(e => ({
                    id: Date.now() + Math.random(),
                    company: e.company || '',
                    title: e.title || '',
                    startDate: e.startDate || '',
                    endDate: e.endDate || '',
                    description: e.description || ''
                }));
            }
            if (parsed.education && Array.isArray(parsed.education)) {
                resumeData.education = parsed.education.map(e => ({
                    id: Date.now() + Math.random(),
                    school: e.school || '',
                    degree: e.degree || '',
                    field: e.field || '',
                    graduationYear: e.graduationYear || ''
                }));
            }
            if (parsed.skills) {
                resumeData.skills = { ...resumeData.skills, ...parsed.skills };
            }
            if (parsed.projects && Array.isArray(parsed.projects)) {
                resumeData.projects = parsed.projects.map(p => ({
                    id: Date.now() + Math.random(),
                    name: p.name || '',
                    description: p.description || '',
                    technologies: p.technologies || ''
                }));
            }
            if (parsed.certifications && Array.isArray(parsed.certifications)) {
                resumeData.certifications = parsed.certifications.map(c => ({
                    id: Date.now() + Math.random(),
                    name: c.name || '',
                    organization: c.organization || '',
                    date: c.date || ''
                }));
            }
            if (parsed.languages && Array.isArray(parsed.languages)) {
                resumeData.languages = parsed.languages.map(l => ({
                    id: Date.now() + Math.random(),
                    name: l.name || '',
                    proficiency: l.proficiency || ''
                }));
            }
            
            populateAllFields();
            updatePreview();
            saveToLocalStorage();
        }

        function parseCVLocal(text) {
            pushState();
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 3);
            
            // Name
            const nameRegex = /^([A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,2})$/;
            for (const line of lines) {
                const match = line.match(nameRegex);
                if (match && line.length < 40) {
                    resumeData.personal.fullName = match[1];
                    break;
                }
            }
            if (!resumeData.personal.fullName && lines.length > 0) {
                resumeData.personal.fullName = lines[0].replace(/[^\w\s]/g, '').trim().substring(0, 40);
            }
            
            // Email
            const emailMatch = text.match(/[\w.-]+@[\w.-]+\.\w+/);
            if (emailMatch) resumeData.personal.email = emailMatch[0];
            
            // Phone
            const phones = text.match(/(\+?\d{1,3}[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/g) || [];
            if (phones[0]) resumeData.personal.phone = phones[0];
            if (phones[1]) resumeData.personal.altPhone = phones[1];
            
            // LinkedIn
            const liMatch = text.match(/linkedin\.com\/in\/[\w-]+/);
            if (liMatch) resumeData.personal.linkedin = 'https://' + liMatch[0];
            
            // GitHub
            const ghMatch = text.match(/github\.com\/[\w-]+/);
            if (ghMatch) resumeData.personal.github = 'https://' + ghMatch[0];
            
            // Summary
            const paragraphs = text.split(/\n\s*\n/).filter(p => p.length > 30);
            if (paragraphs.length > 0) {
                resumeData.summary.careerObjective = paragraphs[0].substring(0, 500);
            }
            
            populateAllFields();
            updatePreview();
            saveToLocalStorage();
        }

        // ============ DOWNLOAD ============
        async function captureResumePages() {
            const pages = document.querySelectorAll('.resume-page');
            const canvases = [];
            
            for (const page of pages) {
                const origTransform = page.style.transform;
                page.style.transform = 'scale(1)';
                const canvas = await html2canvas(page, { 
                    scale: 3, 
                    useCORS: true, 
                    logging: false, 
                    backgroundColor: '#ffffff' 
                });
                canvases.push(canvas);
                page.style.transform = origTransform;
            }
            
            return canvases;
        }

        async function downloadPDF() {
            closeDownloadModal();
            showToast('Generating PDF...', 'info');
            
            try {
                const canvases = await captureResumePages();
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                
                for (let i = 0; i < canvases.length; i++) {
                    if (i > 0) pdf.addPage();
                    const imgData = canvases[i].toDataURL('image/jpeg', 1.0);
                    const w = 210, h = (canvases[i].height * w) / canvases[i].width;
                    pdf.addImage(imgData, 'JPEG', 0, 0, w, Math.min(h, 297));
                }
                
                pdf.save(`${(resumeData.personal.fullName||'resume').replace(/\s+/g,'_')}_CV.pdf`);
                showToast('PDF downloaded!', 'success');
            } catch(e) {
                showToast('Error generating PDF', 'error');
            }
        }

        async function downloadImage(type) {
            const canvases = await captureResumePages();
            // Download first page as image
            const ext = type === 'png' ? 'png' : 'jpg';
            const mime = type === 'png' ? 'image/png' : 'image/jpeg';
            const quality = type === 'png' ? 1.0 : 0.95;
            
            const a = document.createElement('a');
            a.download = `${(resumeData.personal.fullName||'resume').replace(/\s+/g,'_')}_CV.${ext}`;
            a.href = canvases[0].toDataURL(mime, quality);
            a.click();
            showToast(`${type.toUpperCase()} downloaded!`, 'success');
        }

        function downloadPNG() { closeDownloadModal(); downloadImage('png'); }
        function downloadJPEG() { closeDownloadModal(); downloadImage('jpeg'); }

        function downloadTXT() {
            closeDownloadModal();
            const d = resumeData;
            let t = `${d.personal.fullName||'Your Name'}\n${d.summary.currentTitle||''}\n${'='.repeat(50)}\n\n`;
            if (d.personal.email) t += `Email: ${d.personal.email}\n`;
            if (d.personal.phone) t += `Phone: ${d.personal.phone}\n`;
            if (d.personal.altPhone) t += `Alt Phone: ${d.personal.altPhone}\n`;
            if (d.personal.city) t += `Location: ${d.personal.city}\n`;
            if (d.summary.careerObjective) t += `\nSUMMARY\n${'-'.repeat(30)}\n${d.summary.careerObjective}\n`;
            
            if (d.experience.some(e=>e.company||e.title)) {
                t += `\nEXPERIENCE\n${'-'.repeat(30)}\n`;
                d.experience.forEach(e => { if(e.company||e.title) t += `\n${e.title||''} - ${e.company||''}\n${e.startDate||''} - ${e.endDate||'Present'}\n${e.description||''}\n`; });
            }
            if (d.education.some(e=>e.school||e.degree)) {
                t += `\nEDUCATION\n${'-'.repeat(30)}\n`;
                d.education.forEach(e => { if(e.school||e.degree) t += `\n${e.degree||''} - ${e.school||''} (${e.graduationYear||''})\n`; });
            }
            if (d.skills.languages) t += `\nSKILLS\n${'-'.repeat(30)}\nLanguages: ${d.skills.languages}\nTools: ${d.skills.tools}\n`;
            
            const blob = new Blob([t], { type: 'text/plain' });
            const a = document.createElement('a');
            a.download = `${(d.personal.fullName||'resume').replace(/\s+/g,'_')}_CV.txt`;
            a.href = URL.createObjectURL(blob);
            a.click();
            showToast('TXT downloaded!', 'success');
        }

        // ============ MOBILE ============
        function toggleEditorMobile() {
            const panel = document.getElementById('editorPanel');
            const overlay = document.getElementById('mobileOverlay');
            panel.classList.toggle('mobile-open');
            overlay.classList.toggle('show');
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const closeBtn = document.getElementById('closeEditorBtn');
            if (window.innerWidth <= 1024) {
                if (closeBtn) closeBtn.style.display = 'flex';
            } else {
                if (closeBtn) closeBtn.style.display = 'none';
                document.getElementById('editorPanel').classList.remove('mobile-open');
                document.getElementById('mobileOverlay').classList.remove('show');
            }
        });

        // ============ TOAST ============
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'check-circle', error: 'times-circle', info: 'info-circle' };
            toast.innerHTML = `<i class="fas fa-${icons[type]||icons.info}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============ STARTUP ============
        document.addEventListener('DOMContentLoaded', init);
    </script>
